server:
  port: ${PORT:8081}
  address: 0.0.0.0
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/english-center
    username: root
    password: your_database_password # Thay bằng password của bạn
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
  output:
    ansi:
      enabled: ALWAYS
      show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com # Thay bằng email của bạn
    password: "your_app_password" # Thay bằng App Password của bạn
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  main:
    banner-mode: off
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

#logging:
#  level:
#    root: warn

jwt:
  signerKey: ${SIGNER_KEY:your_jwt_secret_key_here}
  access-exp: 86400 # in second
  refresh-exp: 604800 # in seconds

cloudinary:
  cloud-name: ${CLOUD_NAME:your_cloud_name}
  api-key: ${API_KEY:your_api_key}
  api-secret: ${API_SECRET:your_api_secret}
